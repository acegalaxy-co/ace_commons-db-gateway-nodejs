# db-gateway/policies/schema.yaml
# Single source of truth cho schema + naming convention.
# Cả Node SDK + (future) JVM SDK đọc file này.
#
# Phase 1 — mẫu. Project thật copy file này sang <project>/db-gateway/policies/
# và điền table/column thực tế.

naming:
  table: snake_case          # ^[a-z][a-z0-9_]*$
  column: snake_case
  primary_key: id
  foreign_key_suffix: _id    # user_id refs users.id
  timestamps: [created_at, updated_at, deleted_at]

stores:
  postgres:
    # tables:
    #   users:
    #     columns: [id, email, created_at, updated_at, deleted_at]
    #     soft_delete: true
    #     primary_key: id
    tables: {}

  sqlite:
    tables: {}

  notion:
    # databases:
    #   invoices:
    #     id: "abc123..."      # Notion database_id
    #     properties: [name, amount, status, legal_contract]
    databases: {}
